{% extends 'base.html' %} {# فرض می‌کنیم شما یک base.html دارید #}

{% block content %}
<div class="container mt-5">
  <h1 class="mb-4">لیست تگ‌های محلی</h1>
  
  <!-- فیلترها -->
  <div class="row mb-4">
    <div class="col-md-3">
      <input type="text" id="search-input" class="form-control" placeholder="جستجو (تگ، توضیحات، تگ طولانی)">
    </div>
    <div class="col-md-3">
      <select id="obj-type-filter" class="form-select">
        <option value="">همه انواع</option>
        <option value="Machine">ماشین</option>
        <option value="Sensor">سنسور</option>
      </select>
    </div>
    <div class="col-md-3">
      <select id="obj-criticality-filter" class="form-select">
        <option value="">همه سطوح</option>
        <option value="High">بالا</option>
        <option value="Medium">متوسط</option>
      </select>
    </div>
  </div>

  <!-- جدول داده‌ها -->
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>تگ محل</th>
        <th>توضیحات</th>
        <th>سطح اهمیت</th>
        <th>نوع شی</th>
      </tr>
    </thead>
    <tbody id="location-tags-body">
      <!-- داده‌ها اینجا نمایش داده می‌شوند -->
    </tbody>
  </table>
</div>

<script>
  // دریافت داده‌ها از API
  async function fetchLocationTags() {
    const search = document.getElementById('search-input').value;
    const objType = document.getElementById('obj-type-filter').value;
    const criticality = document.getElementById('obj-criticality-filter').value;
    
    let url = '/api/v1/location-tags/';
    const params = new URLSearchParams();
    
    if (search) params.append('search', search);
    if (objType) params.append('obj_type', objType);
    if (criticality) params.append('obj_criticality', criticality);
    
    if (params.toString()) {
      url += '?' + params.toString();
    }
    
    try {
      const response = await fetch(url);
      const data = await response.json();
      
      // پاک کردن جدول قبلی
      const tbody = document.getElementById('location-tags-body');
      tbody.innerHTML = '';
      
      // نمایش داده‌ها
      data.results.forEach(tag => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${tag.loc_tag}</td>
          <td>${tag.description}</td>
          <td>${tag.obj_criticality}</td>
          <td>${tag.obj_type}</td>
        `;
        tbody.appendChild(row);
      });
    } catch (error) {
      console.error('خطا در دریافت داده‌ها:', error);
      tbody.innerHTML = '<tr><td colspan="4" class="text-center">خطا در اتصال به API</td></tr>';
    }
  }

  // اجرای اولیه
  document.addEventListener('DOMContentLoaded', fetchLocationTags);
  
  // اتصال رویدادهای فیلتر
  document.getElementById('search-input').addEventListener('input', fetchLocationTags);
  document.getElementById('obj-type-filter').addEventListener('change', fetchLocationTags);
  document.getElementById('obj-criticality-filter').addEventListener('change', fetchLocationTags);
</script>
{% endblock %}
