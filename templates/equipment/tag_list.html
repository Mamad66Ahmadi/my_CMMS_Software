{% extends "base.html" %}
{% load static %}
{% block title %}Location Tags | Equipment Management{% endblock %}
{% block content %}
<div class="container-fluid mt-4">
    <!-- Search Form -->
    <div class="mb-4">
        <form id="searchForm" class="row g-3">
            <div class="col-md-2">
                <input type="text" id="loc_tag" class="form-control form-control-sm" 
                       placeholder="Location Tag" value="">
            </div>
            <div class="col-md-2">
                <input type="text" id="parent" class="form-control form-control-sm" 
                    placeholder="Parent Tag" value="">
            </div>

            <div class="col-md-2">
                <input type="text" id="unit_code" class="form-control form-control-sm" 
                       placeholder="Unit Code" value="">
            </div>
            <div class="col-md-2">
                <input type="text" id="train" class="form-control form-control-sm" 
                       placeholder="Train" value="">
            </div>
            <div class="col-md-2">
                <input type="text" id="obj_type" class="form-control form-control-sm" 
                       placeholder="Tag Type" value="">
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary btn-sm w-100">
                    <i class="fas fa-search me-1"></i> Search Tags
                </button>
            </div>
        </form>
    </div>
    <!-- Location Tags Table -->
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover table-sm align-middle">
                    <thead class="table-primary">
                        <tr>
                            <th class="fw-bold text-white text-nowrap" style="width: 18%;">Location Tag</th>
                            <th class="fw-bold text-white text-nowrap" style="width: 22%;">Description</th>
                            <th class="fw-bold text-white text-nowrap" style="width: 12%;">Type</th>
                            <th class="fw-bold text-white text-nowrap" style="width: 12%;">Unit</th>
                            <th class="fw-bold text-white text-center text-nowrap" style="width: 10%;">Criticality</th>
                            <th class="fw-bold text-white text-nowrap" style="width: 15%;">Parent</th>
                            <th class="fw-bold text-white text-nowrap" style="width: 11%;">Train</th>
                        </tr>
                    </thead>
                    <tbody id="tagTableBody">
                        <!-- Data will be loaded via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- Pagination -->
    <div id="paginationControls" class="d-flex justify-content-between align-items-center mt-4">
        <div class="text-muted small">Showing <span id="currentPage">1</span> of <span id="totalPages">0</span> pages</div>
        <nav>
            <ul class="pagination mb-0">
                <li class="page-item" id="prevPage">
                    <a class="page-link" href="#" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item" id="nextPage">
                    <a class="page-link" href="#" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    // ✅ CORRECTED API URL (matches DRF ModelViewSet default)
    const API_URL = '/equipment/api/v1/tag/';
    
    let currentPage = 1;
    let totalPages = 0;
    
    document.addEventListener('DOMContentLoaded', function() {
        loadTags();
        
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            currentPage = 1;
            loadTags();
        });
        
        document.getElementById('prevPage').addEventListener('click', function(e) {
            e.preventDefault();
            if (currentPage > 1) {
                currentPage--;
                loadTags();
            }
        });
        
        document.getElementById('nextPage').addEventListener('click', function(e) {
            e.preventDefault();
            if (currentPage < totalPages) {
                currentPage++;
                loadTags();
            }
        });
    });
    
function loadTags() {
    const params = new URLSearchParams({
        page: currentPage,
        loc_tag: document.getElementById('loc_tag').value,
        train: document.getElementById('train').value,
        // ✅ FIX: unit → unit__unit_code
        unit__unit_code: document.getElementById('unit_code').value,
        // ✅ FIX: obj_type → obj_type__obj_type
        obj_type__obj_type: document.getElementById('obj_type').value,
        // ✅ NEW: parent → parent__loc_tag
        parent__loc_tag: document.getElementById('parent').value
    });
    
    fetch(`${API_URL}?${params.toString()}`)
        .then(response => response.json())
        .then(data => {
            renderTags(data.results);
            updatePagination(data);
        })
        .catch(error => {
            console.error('Error loading tags:', error);
            showError('Failed to load location tags. Please try again.');
        });
    }
    
    function renderTags(tags) {
        const tbody = document.getElementById('tagTableBody');
        tbody.innerHTML = '';
        
        if (tags.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="7" class="text-center py-5">
                        <div class="text-center">
                            <i class="fas fa-search text-primary" style="font-size: 3.5rem; opacity: 0.2;"></i>
                            <h5 class="text-primary mt-3">No location tags found</h5>
                            <p class="text-muted mb-0">Try adjusting your search filters</p>
                        </div>
                    </td>
                </tr>
            `;
            return;
        }
        
        tags.forEach(tag => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="fw-medium text-primary text-nowrap">
                    <a href="/equipment/tag/${tag.loc_tag}/" class="text-primary text-decoration-none">
                        ${tag.loc_tag}
                    </a>
                </td>
                <td class="text-nowrap">${tag.description || '-'}</td>
                <td class="text-nowrap">${tag.obj_type || '-'}</td>
                <td class="text-nowrap">${tag.unit || '-'}</td>
                <td class="text-center">
                    ${tag.obj_criticality ? 
                        `<span class="badge bg-${tag.obj_criticality.toLowerCase() === 'high' ? 'danger' : tag.obj_criticality.toLowerCase() === 'medium' ? 'warning' : 'success'}-subtle text-${tag.obj_criticality.toLowerCase() === 'high' ? 'white' : 'dark'} fw-bold" style="padding: 0.4rem 0.7rem; border-radius: 50%;">${tag.obj_criticality}</span>` 
                        : '-'}
                </td>
                <td class="text-nowrap">${tag.parent || '-'}</td>
                <td class="text-nowrap">${tag.train || '-'}</td>
            `;
            tbody.appendChild(row);
        });
    }
    
    function updatePagination(data) {
        // ✅ CORRECTED: Removed currentPage = data.page (API doesn't return page)
        totalPages = Math.ceil(data.count / 50);
        
        document.getElementById('currentPage').textContent = currentPage;
        document.getElementById('totalPages').textContent = totalPages;
        
        document.getElementById('prevPage').classList.toggle('disabled', currentPage <= 1);
        document.getElementById('nextPage').classList.toggle('disabled', currentPage >= totalPages);
    }
    
    function showError(message) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'alert alert-danger alert-dismissible fade show';
        errorDiv.innerHTML = `
            <i class="fas fa-exclamation-circle me-2"></i>
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        `;
        
        document.querySelector('.container-fluid').insertBefore(errorDiv, document.querySelector('.mb-4'));
    }
</script>
{% endblock %}
