{# sidebar.html #}
<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h6>Menu</h6>

        <!-- Collapse / Expand icon (looks like normal text now) -->
        <span id="sidebarToggle" class="sidebar-toggle-icon" title="Collapse / Expand sidebar">
            «
        </span>
    </div>

    <hr>

    <div class="accordion accordion-flush" id="sidebarAccordion">
        <!-- Dashboard -->
            <h6 class="accordion-header" id="dashboardHeading">
                <button class="nav-link dropdown-toggle collapsed d-flex justify-content-between align-items-center"
                        type="button" data-bs-toggle="collapse"
                        data-bs-target="#dashboardCollapse">
                    Dashboard
                    {% if pending_requests_count > 0 and request.user.is_staff %}
                        <span class="badge bg-danger ms-2">{{ pending_requests_count }}</span>
                    {% endif %}
                </button>
            </h6>
            <div id="dashboardCollapse"
                 class="accordion-collapse collapse"
                 data-bs-parent="#sidebarAccordion">
                <div class="accordion-body p-0">
                    <a href="{% url 'accounts:dashboard' %}" class="dropdown-item">Overview</a>
                </div>
            </div>

        <!-- Work Orders -->
            <h6 class="accordion-header">
                <button class="nav-link dropdown-toggle collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#workordersCollapse">
                    Work Orders
                </button>
            </h6>
            <div id="workordersCollapse"
                 class="accordion-collapse collapse"
                 data-bs-parent="#sidebarAccordion">
                <div class="accordion-body p-0">
                    <a href="" class="dropdown-item">All Orders</a>
                    <a href="" class="dropdown-item">Create Order</a>
                </div>
            </div>

        <!-- Daily Reports -->
            <h6 class="accordion-header">
                <button class="nav-link dropdown-toggle collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#reportsCollapse">
                    Daily Reports
                </button>
            </h6>
            <div id="reportsCollapse"
                 class="accordion-collapse collapse"
                 data-bs-parent="#sidebarAccordion">
                <div class="accordion-body p-0">
                    <a href="" class="dropdown-item">View Logs</a>
                </div>
            </div>

        <!-- ASSETS SECTION -->
        <hr class="section-divider">
        <h6 class="section-title">Assets</h6>

        <!-- ASSETS: Location Tag -->
            <h6 class="accordion-header">
                <button class="nav-link dropdown-toggle collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#locationTagCollapse">
                    Location Tag
                </button>
            </h6>
            <div id="locationTagCollapse"
                 class="accordion-collapse collapse"
                 data-bs-parent="#sidebarAccordion">
                <div class="accordion-body p-0">
                    <a href="{% url 'equipment:location_tag_list' %}" class="dropdown-item">Search for</a>
                    <a href="{% url 'equipment:location_tag_create_request' %}" class="dropdown-item">Add New</a>
                </div>
            </div>

        <!-- ASSETS: Equipment -->
            <h6 class="accordion-header">
                <button class="nav-link dropdown-toggle collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#equipmentCollapse">
                    Equipment
                </button>
            </h6>
            <div id="equipmentCollapse"
                 class="accordion-collapse collapse"
                 data-bs-parent="#sidebarAccordion">
                <div class="accordion-body p-0">
                    <a href="{% url 'equipment:equipment_list' %}" class="dropdown-item">Search for</a>
                    <a href="#" class="dropdown-item">Add New</a>
                </div>
            </div>



        <!-- ASSETS: Documents -->
            <h6 class="accordion-header">
                <button class="nav-link"
                        onclick="window.location.href='#'">
                    Documents
                </button>
            </h6>
    </div>
</nav>

<style>
/* --- BASIC SIDEBAR --- */
.sidebar {
    width: 220px;
    background: #2c3136;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 15px;
    transition: width 0.25s ease;
    overflow: hidden;
    font-size: 0.9rem;
    border-right: 1px solid #1f2327;
}

/* Collapsed version */
.sidebar.collapsed {
    width: 60px;
}

/* Hide text when collapsed */
.sidebar.collapsed .nav-link span,
.sidebar.collapsed h6,
.sidebar.collapsed .section-title,
.sidebar.collapsed .dropdown-item {
    display: none;
}

/* Sidebar Header */
.sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Compact the header in collapsed mode */
.sidebar.collapsed .sidebar-header {
    justify-content: center;
}

/* --- Small, regular icon font instead of ugly button --- */
.sidebar-toggle-icon {
    font-size: 0.8rem;
    color: #bbb;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s, transform 0.2s;
}
.sidebar-toggle-icon:hover {
    color: #fff;
    transform: scale(1.15);
}
.sidebar.collapsed .sidebar-toggle-icon {
    display: inline;
}

/* Divider for assets section */
.section-divider {
    border-color: #666;
    margin-top: 20px;
    margin-bottom: 8px;
}

.section-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    color: #aaa;
    margin-left: 3px;
}

/* Accordion buttons */
.sidebar .nav-link {
    color: #ddd;
    padding: 8px;
    border-radius: 4px;
    display: block;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
}

.sidebar .nav-link:hover {
    background-color: #41464b;
    color: #fff;
}

/* Sub-links */
.sidebar .dropdown-item {
    padding: 6px 14px;
    color: #ccc;
}

.sidebar .dropdown-item:hover {
    background-color: #50565c;
    color: #fff;
}
</style>

<script>
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("sidebarToggle");

// Load saved state
if (localStorage.getItem("sidebarCollapsed") === "true") {
    sidebar.classList.add("collapsed");
    toggleBtn.textContent = "»";
}

toggleBtn.addEventListener("click", () => {
    sidebar.classList.toggle("collapsed");
    const collapsed = sidebar.classList.contains("collapsed");
    toggleBtn.textContent = collapsed ? "»" : "«";
    localStorage.setItem("sidebarCollapsed", collapsed);
});
</script>
