{% extends "base.html" %}
{% load static %}

{% block content %}

<style>
    .login-container {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        max-width: 420px;
        margin: 80px auto;
        padding: 30px;
        background-color: #ffffff;
        border-radius: 8px;
        border: 1px solid #eee;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .login-title {
        color: #43334C;
        font-size: 22px;
        margin-bottom: 25px;
        text-align: center;
        font-weight: 600;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 18px;
    }

    .form-label {
        font-size: 12px;
        color: #666;
        margin-bottom: 6px;
        font-weight: 600;
    }

    .form-input {
        padding: 9px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 13px;
    }

    .form-input:focus {
        border-color: #43334C;
        outline: none;
    }

    .btn-login {
        width: 100%;
        padding: 10px;
        background-color: #43334C;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        margin-top: 10px;
    }

    .btn-login:hover {
        background-color: #5a4a5e;
    }

    .extra-links {
        text-align: center;
        margin-top: 15px;
        font-size: 12px;
    }

    .extra-links a {
        color: #43334C;
        text-decoration: none;
        font-weight: 500;
    }

    .extra-links a:hover {
        text-decoration: underline;
    }

    .error-box {
        background-color: #f8d7da;
        color: #842029;
        padding: 8px;
        border-radius: 4px;
        font-size: 12px;
        margin-bottom: 15px;
        border: 1px solid #f5c2c7;
    }
</style>

<div class="login-container">

    <div class="login-title">
        System Login
    </div>

    {% if form.errors %}
        <div class="error-box">
            Invalid username or password.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label" for="id_username">Username</label>
            <input type="text"
                   name="username"
                   id="id_username"
                   class="form-input"
                   required
                   autofocus>
        </div>

        <div class="form-group">
            <label class="form-label" for="id_password">Password</label>
            <input type="password"
                   name="password"
                   id="id_password"
                   class="form-input"
                   required>
        </div>

        <button type="submit" class="btn-login">
            Login
        </button>

        <input type="hidden" name="next" value="{{ next }}">

    </form>

    <div class="extra-links">
        <a href="">
            Forgot your password?
        </a>
    </div>

</div>

{% endblock %}
